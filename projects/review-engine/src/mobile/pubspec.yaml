name: review_engine_mobile
description: "Mobile application for The Review Engine."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.1.5
  provider: ^6.0.5
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  intl: ^0.18.1
  lucide_icons: ^0.301.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
