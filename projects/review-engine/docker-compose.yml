services:
  db:
    image: postgres:15-alpine
    container_name: review_engine_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-review_engine}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: review_engine_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-review_engine}

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: review_engine_frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
